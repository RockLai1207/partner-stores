<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理 · 精選夥伴商店</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1917;
    --surface2: #232220;
    --border: #2e2c29;
    --text: #e8e4dc;
    --muted: #7a7570;
    --earth: #c4935a;
    --gold: #c9a84c;
    --rust: #c4622d;
    --sage: #7a9b6e;
    --danger: #e05252;
    --cream: #f5f0e8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* LOGIN */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .login-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 6px;
  }

  .login-box p { font-size: 0.82rem; color: var(--muted); margin-bottom: 32px; font-weight: 300; }

  .form-group { margin-bottom: 14px; text-align: left; }

  .form-group label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
    font-weight: 500;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 13px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--earth); }

  .form-group textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .form-group select option { background: var(--surface2); }

  .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 8px; display: none; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.87rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
    text-decoration: none;
  }

  .btn-primary { background: var(--earth); color: white; justify-content: center; }
  .btn-primary:hover { background: #d4a06a; }
  .btn-login { width: 100%; padding: 13px; font-size: 0.95rem; margin-top: 8px; }
  .btn-sm { padding: 6px 13px; font-size: 0.78rem; border-radius: 7px; }
  .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--earth); color: var(--earth); }
  .btn-danger { background: rgba(224,82,82,0.12); color: var(--danger); border: 1.5px solid rgba(224,82,82,0.25); }
  .btn-danger:hover { background: rgba(224,82,82,0.22); }

  /* APP */
  #appScreen { display: none; }

  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .app-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.08rem;
    color: var(--cream);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .app-header h1::before {
    content: '';
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--sage);
  }

  .header-actions { display: flex; align-items: center; gap: 10px; }

  .logout-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
  }

  .logout-btn:hover { color: var(--danger); }

  .app-main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--cream);
  }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 36px;
  }

  table { width: 100%; border-collapse: collapse; }

  th {
    padding: 13px 16px;
    text-align: left;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  td {
    padding: 13px 16px;
    font-size: 0.84rem;
    border-bottom: 1px solid rgba(46,44,41,0.5);
    vertical-align: middle;
    max-width: 200px;
  }

  td.wrap-cell { white-space: normal; word-break: break-word; }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 100px;
    font-size: 0.68rem;
    font-weight: 500;
  }

  .badge-active { background: rgba(122,155,110,0.2); color: var(--sage); }
  .badge-inactive { background: rgba(122,122,122,0.15); color: var(--muted); }
  .badge-online { background: rgba(100,160,100,0.15); color: #8bb88b; }
  .badge-physical { background: rgba(196,147,90,0.15); color: var(--earth); }

  .actions-cell { display: flex; gap: 6px; }

  /* Form Panel */
  .form-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px;
    margin-bottom: 32px;
  }

  .form-panel h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--cream);
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-grid .full { grid-column: 1 / -1; }

  .form-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }

  /* Toggle */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 13px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 9px;
  }

  .toggle {
    width: 34px; height: 19px;
    background: var(--border);
    border-radius: 100px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    border: none;
    flex-shrink: 0;
  }

  .toggle::after {
    content: '';
    position: absolute;
    width: 13px; height: 13px;
    background: white;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.2s;
  }

  .toggle.on { background: var(--sage); }
  .toggle.on::after { transform: translateX(15px); }
  .toggle-label { font-size: 0.83rem; color: var(--muted); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 18px;
    font-size: 0.84rem;
    color: var(--text);
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    max-width: 260px;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--sage); }
  #toast.error { border-color: var(--danger); }

  #loadingOverlay {
    position: fixed;
    inset: 0;
    background: rgba(15,14,12,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .spinner {
    width: 34px; height: 34px;
    border: 2px solid rgba(196,147,90,0.2);
    border-top-color: var(--earth);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-row td { text-align: center; padding: 44px; color: var(--muted); font-style: italic; }

  @media (max-width: 768px) {
    .app-main { padding: 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    table { font-size: 0.76rem; }
    th, td { padding: 9px 10px; }
    .app-header { padding: 0 14px; }
  }
</style>
</head>
<body>

<!-- 登入 -->
<div id="loginScreen">
  <div class="login-box">
    <h2>後台管理</h2>
    <p>請輸入管理員帳號密碼</p>
    <div class="form-group">
      <label>帳號</label>
      <input type="text" id="loginUser" placeholder="admin">
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <p class="error-msg" id="loginError">帳號或密碼錯誤</p>
    <button class="btn btn-primary btn-login" onclick="doLogin()">登入</button>
  </div>
</div>

<!-- 主畫面 -->
<div id="appScreen">
  <header class="app-header">
    <h1>精選夥伴商店 · 後台</h1>
    <div class="header-actions">
      <a href="index.html" target="_blank" class="btn btn-ghost btn-sm">👁 檢視前台</a>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>
  </header>

  <main class="app-main">

    <!-- 表單 -->
    <div class="form-panel">
      <h3 id="formTitle">➕ 新增夥伴商店</h3>
      <input type="hidden" id="editId">
      <div class="form-grid">

        <div class="form-group">
          <label>商店名稱 *</label>
          <input type="text" id="fName" placeholder="例：MOMO 購物網">
        </div>

        <div class="form-group">
          <label>分類</label>
          <select id="fCategory">
            <option value="">— 請選擇 —</option>
            <option>知名品牌</option>
            <option>居家</option>
            <option>生活綜合型電商</option>
            <option>美食佳餚</option>
            <option>服飾穿搭</option>
            <option>旅遊住宿票券餐券</option>
            <option>專業服務</option>
            <option>寵物</option>
            <option>藝術與文化</option>
          </select>
        </div>

        <div class="form-group full">
          <label>網站連結</label>
          <input type="text" id="fWebsite" placeholder="https://...">
        </div>

        <div class="form-group full">
          <label>特色簡介</label>
          <textarea id="fDescription" placeholder="簡短介紹這間商店的特色、優勢..."></textarea>
        </div>

        <div class="form-group">
          <label>網路或實體</label>
          <select id="fStoreType">
            <option value="">— 請選擇 —</option>
            <option value="網路">🌐 網路商店</option>
            <option value="實體">🏪 實體商店</option>
          </select>
        </div>

        <div class="form-group">
          <label>IBV</label>
          <input type="text" id="fIbv" placeholder="例：150 IBV">
        </div>

        <div class="form-group">
          <label>現金回饋 / IBV</label>
          <input type="text" id="fCashback" placeholder="例：3% / 50 IBV">
        </div>

        <div class="form-group">
          <label>排序（數字越小越前面）</label>
          <input type="number" id="fSortOrder" placeholder="0" value="0">
        </div>

        <div class="form-group full">
          <label>備註</label>
          <textarea id="fNote" placeholder="其他補充說明、使用限制、有效期限..." style="min-height:60px"></textarea>
        </div>

        <div class="form-group">
          <label>顯示狀態</label>
          <div class="toggle-wrap">
            <button class="toggle on" id="fActiveToggle" onclick="toggleActive()"></button>
            <span class="toggle-label" id="fActiveLabel">顯示中</span>
          </div>
        </div>

      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="resetForm()">清除</button>
        <button class="btn btn-primary" style="padding:10px 28px" onclick="savePartner()">💾 儲存</button>
      </div>
    </div>

    <!-- 列表 -->
    <div class="section-header">
      <div class="section-title">夥伴商店列表</div>
      <span style="font-size:0.8rem;color:var(--muted)" id="countLabel"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>商店名稱</th>
            <th>分類</th>
            <th>類型</th>
            <th>IBV</th>
            <th>現金回饋/IBV</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="partnerTable">
          <tr class="empty-row"><td colspan="7">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<div id="loadingOverlay"><div class="spinner"></div></div>
<div id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwI-PAtGw5wquZ6NiFZAQOep_MfonrhoMNq5gVKg5XGSX8VEn5oa7CAluq8hNGCIseW/exec';
  const ADMIN_USER = 'superadmin';
  const ADMIN_PASS = 'Aa111111';

  let partners = [];
  let isActiveState = true;

  // 登入
  function doLogin() {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      sessionStorage.setItem('admin_auth', '1');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'block';
      loadPartners();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('admin_auth');
    location.reload();
  }

  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    loadPartners();
  }

  // 讀取
  async function loadPartners() {
    showLoading(true);
    try {
      const res = await fetch(`${SCRIPT_URL}?action=list`);
      partners = await res.json();
      renderTable();
    } catch (e) {
      toast('載入失敗，請確認 Apps Script 設定', 'error');
    }
    showLoading(false);
  }

  function renderTable() {
    document.getElementById('countLabel').textContent = `共 ${partners.length} 間`;
    const tbody = document.getElementById('partnerTable');

    if (!partners.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">還沒有夥伴商店，從上方新增吧！</td></tr>';
      return;
    }

    tbody.innerHTML = partners.map(p => {
      const active = p.is_active === 'TRUE' || p.is_active === true;
      const isOnline = p.store_type === '網路';
      return `
      <tr>
        <td><strong>${p.name}</strong>${p.website_url ? `<br><a href="${p.website_url}" target="_blank" style="font-size:0.72rem;color:#7a7570;word-break:break-all">${p.website_url.replace(/^https?:\/\//,'')}</a>` : ''}</td>
        <td>${p.category || '—'}</td>
        <td>${p.store_type ? `<span class="badge ${isOnline?'badge-online':'badge-physical'}">${isOnline?'🌐 網路':'🏪 實體'}</span>` : '—'}</td>
        <td>${p.ibv || '—'}</td>
        <td>${p.cashback || '—'}</td>
        <td><span class="badge ${active?'badge-active':'badge-inactive'}">${active?'顯示':'隱藏'}</span></td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-ghost btn-sm" onclick="editPartner('${p.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deletePartner('${p.id}','${p.name.replace(/'/g,"\\'")}')">🗑</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  function toggleActive() {
    isActiveState = !isActiveState;
    document.getElementById('fActiveToggle').classList.toggle('on', isActiveState);
    document.getElementById('fActiveLabel').textContent = isActiveState ? '顯示中' : '隱藏';
  }

  function resetForm() {
    document.getElementById('editId').value = '';
    document.getElementById('formTitle').textContent = '➕ 新增夥伴商店';
    ['fName','fWebsite','fDescription','fIbv','fCashback','fNote'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fCategory').value = '';
    document.getElementById('fStoreType').value = '';
    document.getElementById('fSortOrder').value = '0';
    isActiveState = true;
    document.getElementById('fActiveToggle').classList.add('on');
    document.getElementById('fActiveLabel').textContent = '顯示中';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function editPartner(id) {
    const p = partners.find(x => x.id === id);
    if (!p) return;
    document.getElementById('editId').value = p.id;
    document.getElementById('formTitle').textContent = '✏️ 編輯：' + p.name;
    document.getElementById('fName').value = p.name || '';
    document.getElementById('fCategory').value = p.category || '';
    document.getElementById('fWebsite').value = p.website_url || '';
    document.getElementById('fDescription').value = p.description || '';
    document.getElementById('fStoreType').value = p.store_type || '';
    document.getElementById('fIbv').value = p.ibv || '';
    document.getElementById('fCashback').value = p.cashback || '';
    document.getElementById('fNote').value = p.note || '';
    document.getElementById('fSortOrder').value = p.sort_order || 0;
    isActiveState = p.is_active === 'TRUE' || p.is_active === true;
    document.getElementById('fActiveToggle').classList.toggle('on', isActiveState);
    document.getElementById('fActiveLabel').textContent = isActiveState ? '顯示中' : '隱藏';
    document.querySelector('.form-panel').scrollIntoView({ behavior: 'smooth' });
  }

  async function savePartner() {
    const name = document.getElementById('fName').value.trim();
    if (!name) { toast('請填寫商店名稱', 'error'); return; }

    const id = document.getElementById('editId').value;
    const payload = {
      action: id ? 'update' : 'create',
      id,
      name,
      category: document.getElementById('fCategory').value,
      website_url: document.getElementById('fWebsite').value.trim(),
      description: document.getElementById('fDescription').value.trim(),
      store_type: document.getElementById('fStoreType').value,
      ibv: document.getElementById('fIbv').value.trim(),
      cashback: document.getElementById('fCashback').value.trim(),
      note: document.getElementById('fNote').value.trim(),
      sort_order: document.getElementById('fSortOrder').value || 0,
      is_active: isActiveState,
    };

    showLoading(true);
    try {
      const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
      const result = await res.json();
      if (result.success) {
        toast(id ? '✓ 更新成功！' : '✓ 新增成功！', 'success');
        resetForm();
        await loadPartners();
      } else {
        toast('儲存失敗：' + result.error, 'error');
      }
    } catch (e) {
      toast('儲存失敗，請確認 Script 設定', 'error');
    }
    showLoading(false);
  }

  async function deletePartner(id, name) {
    if (!confirm(`確定要刪除「${name}」？`)) return;
    showLoading(true);
    try {
      const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id }) });
      const result = await res.json();
      if (result.success) {
        toast(`已刪除「${name}」`, 'success');
        await loadPartners();
      } else {
        toast('刪除失敗', 'error');
      }
    } catch (e) {
      toast('刪除失敗', 'error');
    }
    showLoading(false);
  }

  function showLoading(show) {
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
  }

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    setTimeout(() => el.className = '', 3000);
  }
</script>
</body>
</html>
