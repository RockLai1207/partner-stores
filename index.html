<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精選夥伴商店</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #F5EFE4;
  --bg-soft:     #ECE4D4;
  --bg-card:     #FFFBF3;
  --ink:         #2A241D;
  --ink-soft:    #6B5F52;
  --ink-mute:    #9B8E7E;
  --line:        #D9CFB9;
  --line-soft:   #E8DFCB;
  --accent:      #B8704B;
  --accent-deep: #8E5436;
  --accent-soft: #F0DCC8;
  --serif:       'Cormorant Garamond', 'Noto Serif TC', serif;
  --sans:        'Noto Sans TC', 'PingFang TC', sans-serif;
  --shadow-sm:   0 1px 2px rgba(60,40,20,.04), 0 2px 8px rgba(60,40,20,.04);
  --shadow-md:   0 2px 6px rgba(60,40,20,.05), 0 12px 32px rgba(60,40,20,.08);
  --shadow-lg:   0 8px 24px rgba(60,40,20,.08), 0 24px 64px rgba(60,40,20,.12);
  --r-sm: 8px; --r: 14px; --r-lg: 20px;
}

/* Category tones */
.tone-知名品牌      { --tone: #B8704B; }
.tone-居家          { --tone: #7A9B6E; }
.tone-生活綜合型電商 { --tone: #5E8A9C; }
.tone-美食佳餚      { --tone: #C4834A; }
.tone-服飾穿搭      { --tone: #9B7EB8; }
.tone-旅遊住宿票券餐券 { --tone: #5B8C8A; }
.tone-專業服務      { --tone: #8A7B6E; }
.tone-寵物          { --tone: #C47A5A; }
.tone-藝術與文化    { --tone: #8B6FA0; }

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "palt" 1;
  letter-spacing: .01em;
  line-height: 1.6;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(184,112,75,.05), transparent 40%),
    radial-gradient(circle at 85% 70%, rgba(139,154,107,.04), transparent 40%);
  background-attachment: fixed;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }

/* ── HEADER ── */
.site-header {
  max-width: 1320px; margin: 0 auto;
  padding: 32px 48px 18px;
  display: flex; align-items: baseline; justify-content: space-between; gap: 24px;
}
.brand-mark { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
.brand-mark__title {
  font-family: var(--serif); font-weight: 500; font-size: 36px;
  line-height: 1; letter-spacing: 0; color: var(--ink);
}
.brand-mark__title em { font-style: italic; color: var(--accent); font-weight: 400; }
.brand-mark__sub {
  color: var(--ink-soft); font-size: 13.5px; position: relative; padding-left: 16px;
}
.brand-mark__sub::before {
  content: ''; position: absolute; left: 0; top: 50%;
  width: 8px; height: 1px; background: var(--accent);
}
.brand-stamp { display: flex; align-items: baseline; gap: 8px; font-family: var(--serif); white-space: nowrap; }
.brand-stamp__num { font-size: 28px; line-height: 1; font-style: italic; font-weight: 500; color: var(--accent); letter-spacing: -.01em; }
.brand-stamp__label { font-family: var(--sans); font-size: 10px; letter-spacing: .25em; color: var(--ink-mute); }

/* ── FILTERS ── */
.filters {
  max-width: 1320px; margin: 0 auto;
  padding: 12px 48px 8px;
  border-top: 1px solid var(--line);
}
.filter-bar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.filter-group { display: inline-flex; align-items: center; gap: 2px; flex-wrap: wrap; }
.filter-divider { width: 1px; height: 18px; background: var(--line); margin: 0 6px; }
.chip {
  padding: 5px 11px; border-radius: 999px; font-size: 13px;
  color: var(--ink-soft); background: transparent; border: 1px solid transparent;
  transition: all .18s ease;
  display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; line-height: 1.4;
}
.chip:hover { color: var(--ink); background: var(--bg-soft); }
.chip--active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.chip--active:hover { background: var(--ink); color: var(--bg); }
.search-wrap { margin-left: auto; position: relative; display: flex; align-items: center; }
.search-wrap input {
  font-family: inherit; font-size: 13px; padding: 6px 12px 6px 30px;
  width: 180px; border-radius: 999px; border: 1px solid var(--line);
  background: var(--bg-card); color: var(--ink); transition: all .2s; outline: none;
}
.search-wrap input::placeholder { color: var(--ink-mute); }
.search-wrap input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px var(--accent-soft); width: 220px; }
.search-icon { position: absolute; left: 10px; color: var(--ink-mute); pointer-events: none; }

/* ── RESULT META ── */
.result-meta {
  max-width: 1320px; margin: 0 auto; padding: 18px 48px 0;
  display: flex; justify-content: space-between; align-items: center;
  color: var(--ink-soft); font-size: 14px;
}
.result-meta strong {
  font-family: var(--serif); font-style: italic; color: var(--accent);
  font-size: 22px; font-weight: 500; margin: 0 4px;
}

/* ── GRID ── */
.grid {
  max-width: 1320px; margin: 0 auto; padding: 24px 48px 96px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 28px;
}

/* ── CARD ── */
.card {
  background: var(--bg-card); border-radius: var(--r-lg); overflow: hidden;
  cursor: pointer; display: flex; flex-direction: column;
  border: 1px solid var(--line-soft); box-shadow: var(--shadow-sm);
  transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  animation: fadeUp .4s ease both;
}
.card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--line); }
.card:hover .card__cta { color: var(--accent); }
.card:hover .card__cta-arrow { transform: translateX(3px); }

@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

/* Store image */
.store-image {
  position: relative; aspect-ratio: 16/7; overflow: hidden;
  background: linear-gradient(135deg, var(--tone, var(--accent)), color-mix(in srgb, var(--tone, var(--accent)) 65%, #1a1410 35%));
}
.store-image img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  position: relative; z-index: 1; transition: opacity .2s, transform .4s ease;
}
.card:hover .store-image img { transform: scale(1.03); }
.store-image__bg {
  position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(135deg, var(--tone, var(--accent)), color-mix(in srgb, var(--tone, var(--accent)) 65%, #1a1410 35%));
}

/* favicon 模式：小圖居中 contain，底色顯示 */
.store-image--favicon img {
  object-fit: contain;
  padding: 14px;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
}

/* fallback：幾何圖樣 */
.store-image--fallback {
  display: flex; align-items: center;
  justify-content: flex-start; padding: 0 18px; gap: 14px;
}
.store-image__deco {
  position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none;
}
.store-image__mark {
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;
  background: rgba(255,255,255,.14);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-radius: 10px; border: 1px solid rgba(255,255,255,.2);
}
.store-image__initial {
  font-family: var(--serif); font-size: 26px; font-weight: 500; font-style: italic;
  color: rgba(255,255,255,.98); line-height: 1;
}
.store-image__cat-tag {
  position: absolute; bottom: 12px; right: 14px; z-index: 2;
  font-size: 10.5px; letter-spacing: .18em;
  color: rgba(255,255,255,.94); background: rgba(0,0,0,.32);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  padding: 4px 10px; border-radius: 999px; white-space: nowrap;
}
.store-image--fallback .store-image__cat-tag {
  position: relative; bottom: auto; right: auto;
  margin-left: auto; background: rgba(0,0,0,.22);
}

/* Card body */
.card__body { padding: 20px 22px 22px; display: flex; flex-direction: column; gap: 12px; flex: 1; position: relative; }
.card__accent {
  position: absolute; left: 0; top: 22px; bottom: 22px; width: 3px;
  border-radius: 0 3px 3px 0; background: var(--tone, var(--accent));
}
.card__pills { display: flex; flex-wrap: wrap; gap: 6px; }

.cat-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px 3px 8px; border-radius: 999px; font-size: 11.5px;
  color: var(--tone, var(--accent));
  background: color-mix(in srgb, var(--tone, var(--accent)) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--tone, var(--accent)) 25%, transparent);
  font-weight: 500;
}
.type-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 999px; font-size: 11.5px;
  border: 1px solid var(--line); color: var(--ink-soft); background: var(--bg);
}
.type-pill--online  { color: #5E8A9C; border-color: #BFD4DD; background: #EDF3F6; }
.type-pill--offline { color: #8B7355; border-color: #DDD0BB; background: #F4EEE0; }

.card__title {
  font-family: var(--serif); font-weight: 500; font-size: 22px; line-height: 1.25;
  color: var(--ink); letter-spacing: 0;
}
.card__desc {
  font-size: 13.5px; line-height: 1.65; color: var(--ink-soft);
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}

/* Rewards */
.card__rewards {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin-top: 6px;
  border-top: 1px dashed var(--line); border-bottom: 1px dashed var(--line); padding: 10px 0;
}
.reward { display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
.reward + .reward { border-left: 1px dashed var(--line); }
.reward__label { font-size: 10.5px; color: var(--ink-mute); letter-spacing: .15em; text-transform: uppercase; font-weight: 500; }
.reward__value { font-family: var(--serif); font-size: 22px; color: var(--ink); display: flex; align-items: baseline; gap: 4px; font-weight: 500; }
.reward--ibv .reward__value strong { color: var(--accent); font-style: italic; font-size: 26px; }
.reward--cashback .reward__value strong { color: var(--ink); }

/* Note */
.card__note {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 10px 12px; background: var(--accent-soft);
  border-radius: var(--r-sm); font-size: 12px; line-height: 1.5; color: var(--accent-deep);
}
.card__note-text {
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; flex: 1;
}
.card__cta {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto; padding-top: 4px;
  font-family: var(--serif); font-style: italic; font-size: 15px;
  color: var(--ink-soft); transition: color .2s;
}
.card__cta-arrow { display: inline-block; transition: transform .2s; }

/* ── MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(42,36,29,.55);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 32px;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.modal {
  background: var(--bg-card); border-radius: var(--r-lg);
  max-width: 640px; width: 100%; max-height: calc(100vh - 64px);
  overflow-y: auto; position: relative; box-shadow: var(--shadow-lg);
  animation: slideUp .28s cubic-bezier(.2,.8,.2,1);
}
@keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

.modal__close {
  position: absolute; top: 16px; right: 16px; width: 36px; height: 36px;
  border-radius: 50%; background: rgba(255,255,255,.85); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center; z-index: 2;
  color: var(--ink); transition: background .15s; cursor: pointer;
}
.modal__close:hover { background: white; }
.modal__hero .store-image { aspect-ratio: 16/6; }
.modal__body { padding: 28px 32px 32px; display: flex; flex-direction: column; gap: 18px; }
.modal__pills { display: flex; gap: 8px; flex-wrap: wrap; }
.modal__title { font-family: var(--serif); font-weight: 500; font-size: 36px; line-height: 1.15; letter-spacing: -.005em; }
.modal__desc { font-size: 15px; line-height: 1.75; color: var(--ink-soft); }

.modal__rewards { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 8px 0 4px; }
.modal-reward {
  background: var(--bg-soft); border-radius: var(--r); padding: 16px 14px;
  display: flex; flex-direction: column; gap: 4px; border: 1px solid var(--line-soft);
}
.modal-reward--accent {
  background: linear-gradient(155deg, var(--accent) 0%, var(--accent-deep) 100%);
  color: white; border-color: transparent;
}
.modal-reward--accent .modal-reward__label,
.modal-reward--accent .modal-reward__hint { color: rgba(255,255,255,.78); }
.modal-reward__label { font-size: 11px; letter-spacing: .15em; color: var(--ink-mute); text-transform: uppercase; }
.modal-reward__value { font-family: var(--serif); font-size: 36px; line-height: 1.1; font-weight: 500; font-style: italic; }
.modal-reward__hint { font-size: 11.5px; color: var(--ink-mute); }

.modal__note {
  display: flex; gap: 12px; padding: 14px 16px;
  background: var(--accent-soft); border-radius: var(--r); color: var(--accent-deep);
}
.modal__note-label { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
.modal__note p { margin: 0; font-size: 13.5px; line-height: 1.6; }

.modal__link {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 24px; background: var(--ink); color: var(--bg);
  border-radius: 999px; font-size: 14px; letter-spacing: .05em;
  margin-top: 8px; transition: background .2s; align-self: flex-start;
}
.modal__link:hover { background: var(--accent-deep); }

/* ── EMPTY / LOADING ── */
.empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--ink-mute); }
.empty__title { font-family: var(--serif); font-style: italic; font-size: 28px; color: var(--ink-soft); margin: 0 0 6px; }
.empty__hint { font-size: 14px; }
.loading-wrap { grid-column: 1/-1; display: flex; justify-content: center; padding: 80px; }
.spinner {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--line); border-top-color: var(--accent);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── FOOTER ── */
.site-footer {
  max-width: 1320px; margin: 0 auto; padding: 32px 48px 64px;
  border-top: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center;
  color: var(--ink-mute); font-size: 13px;
}
.site-footer__brand { font-family: var(--serif); font-style: italic; color: var(--ink-soft); }

/* ── RESPONSIVE ── */
@media (max-width: 800px) {
  .site-header { padding: 20px 18px 14px; }
  .brand-mark__title { font-size: 24px; white-space: nowrap; }
  .brand-mark__sub { font-size: 12px; }
  .brand-stamp__num { font-size: 20px; }

  .filters { padding: 10px 18px 6px; }
  .filter-bar { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-group { flex-wrap: nowrap; flex: none; }
  .chip { font-size: 12.5px; padding: 5px 10px; }
  .search-wrap { margin: 6px 0 0; width: 100%; }
  .search-wrap input { width: 100%; font-size: 14px; padding: 8px 14px 8px 32px; }
  .search-wrap input:focus { width: 100%; }

  .result-meta { padding: 14px 18px 0; font-size: 13px; }
  .result-meta strong { font-size: 18px; }

  .grid { padding: 16px 18px 64px; gap: 14px; grid-template-columns: 1fr; }
  .card__title { font-size: 19px; }
  .card__body { padding: 14px 16px 16px; gap: 10px; }

  .modal { max-height: 100vh; border-radius: 0; max-width: 100%; }
  .modal-backdrop { padding: 0; align-items: flex-end; }
  .modal__body { padding: 22px 20px 28px; gap: 14px; }
  .modal__title { font-size: 26px; }
  .modal__rewards { grid-template-columns: 1fr 1fr; }
  .modal-reward__value { font-size: 28px; }

  .site-footer { padding: 20px 18px 32px; flex-direction: column; gap: 6px; text-align: center; }
}
@media (max-width: 380px) {
  .brand-mark__title { font-size: 22px; }
  .brand-mark__sub { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="brand-mark">
    <h1 class="brand-mark__title">精選<em>夥伴</em>商店</h1>
    <div class="brand-mark__sub">精心挑選．值得信賴的合作夥伴</div>
  </div>
  <div class="brand-stamp">
    <span class="brand-stamp__num" id="storeCount">—</span>
    <span class="brand-stamp__label">PARTNER STORES</span>
  </div>
</header>

<!-- FILTERS -->
<div class="filters">
  <div class="filter-bar">
    <div class="filter-group" id="catChips">
      <button class="chip chip--active" data-cat="全部">全部</button>
    </div>
    <span class="filter-divider"></span>
    <div class="filter-group">
      <button class="chip chip--active" data-type="全部">全部</button>
      <button class="chip" data-type="網路">

      </button>
      <button class="chip" data-type="實體">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        實體
      </button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">

      </span>
      <input type="text" id="searchInput" placeholder="搜尋…">
    </div>
  </div>
</div>

<!-- RESULT META -->
<div class="result-meta">
  <div>找到 <strong id="resultCount">—</strong> 間夥伴商店</div>
</div>

<!-- GRID -->
<main class="grid" id="grid">
  <div class="loading-wrap"><div class="spinner"></div></div>
</main>

<!-- MODAL (rendered by JS) -->
<div id="modalRoot"></div>

<!-- FOOTER -->
<footer class="site-footer">
  <span class="site-footer__brand">精選夥伴商店</span>
  <span>精心推薦，每間都值得</span>
</footer>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxj12fGdRDxOBiVyEZTpbgeM9pPKfbZkBH99kHL6M3Ka06lj4eVGR9FxsUtpqT7mDJ1/exec';

  '美食佳餚':       '<path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>',
  '服飾穿搭':       '<polyline points="20.84 4.61 5.17 4.61 2 12 12 12 12 22 22 12 19 4.61"/>',
  '旅遊住宿票券餐券':'<circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 1.892.402 3.13 1.5 4.5L12 22l6.5-7.5c1.098-1.37 1.5-2.608 1.5-4.5a8 8 0 0 0-8-8z"/>',
  '專業服務':       '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
  '寵物':           '<path d="M10 5.172C10 3.782 8.423 2.679 6.5 3c-2.823.47-4.113 6.006-4 7 .08.703 1.725 1.722 3.656 1 1.261-.472 1.96-1.45 2.344-2"/><path d="M14.267 5.172c0-1.39 1.577-2.493 3.5-2.172 2.823.47 4.113 6.006 4 7-.08.703-1.725 1.722-3.656 1-1.261-.472-1.96-1.45-2.344-2"/><path d="M8 14v.5"/><path d="M16 14v.5"/><path d="M11.25 16.25h1.5L12 17l-.75-.75z"/><path d="M4.42 11.247A13.152 13.152 0 0 0 4 14.556C4 18.728 7.582 21 12 21s8-2.272 8-6.444c0-1.061-.162-2.2-.493-3.309m-9.243-6.082A8.801 8.801 0 0 1 12 5c.78 0 1.5.108 2.161.306"/>',
  '藝術與文化':     '<circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/>',
};

let allPartners = [];
let currentCat  = '全部';
let currentType = '全部';
let searchQuery = '';
let openStore   = null;

// ── FETCH ────────────────────────────────────────────────
async function fetchPartners() {
  try {
    const [pRes, cRes] = await Promise.all([
      fetch(`${SCRIPT_URL}?action=list`),
      fetch(`${SCRIPT_URL}?action=listCategories`),
    ]);
    const cats = await cRes.json();
    // Build dynamic lookup tables
    CATEGORIES = cats.map(c => c.name);
    CATEGORY_TONE = {};
    cats.forEach(c => { CATEGORY_TONE[c.name] = c.tone || '#B8704B'; });

    const data = await pRes.json();
    allPartners = data.filter(p => p.is_active !== false && p.is_active !== 'FALSE');
    renderCategories();
    renderGrid();
    document.getElementById('storeCount').textContent = allPartners.length;
  } catch (e) {
    document.getElementById('grid').innerHTML = `<div class="empty"><p class="empty__title">無法載入資料</p><p class="empty__hint">請確認 Apps Script 設定</p></div>`;
  }
}

// ── CATEGORIES ───────────────────────────────────────────
function renderCategories() {
  const used = new Set(allPartners.map(p => p.category).filter(Boolean));
  const wrap = document.getElementById('catChips');
  const existing = wrap.querySelector('[data-cat="全部"]');
  wrap.innerHTML = '';
  wrap.appendChild(existing || makeChipEl('全部', 'cat'));

  CATEGORIES.filter(c => used.has(c)).forEach(cat => {
    wrap.appendChild(makeChipEl(cat, 'cat'));
  });

  wrap.querySelectorAll('[data-cat]').forEach(btn =>
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      wrap.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('chip--active', b.dataset.cat === currentCat));
      renderGrid();
    })
  );
}

function makeChipEl(label, kind) {
  const btn = document.createElement('button');
  btn.className = 'chip' + (label === '全部' ? ' chip--active' : '');
  btn.dataset[kind === 'cat' ? 'cat' : 'type'] = label;
  btn.textContent = label;
  return btn;
}

// ── GRID ─────────────────────────────────────────────────
function renderGrid() {
  const q = searchQuery.toLowerCase();
  const filtered = allPartners.filter(p => {
    const matchCat  = currentCat  === '全部' || p.category   === currentCat;
    const matchType = currentType === '全部' || p.store_type === currentType;
    const matchQ    = !q || (p.name + ' ' + p.description + ' ' + p.category).toLowerCase().includes(q);
    return matchCat && matchType && matchQ;
  });

  document.getElementById('resultCount').textContent = filtered.length;

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><p class="empty__title">沒有找到商店</p><p class="empty__hint">試試其他關鍵字或篩選條件</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((p, i) => cardHTML(p, i)).join('');
  grid.querySelectorAll('.card').forEach((el, i) => {
    el.style.animationDelay = `${i * 0.04}s`;
    el.addEventListener('click', () => openModal(filtered[i]));
  });
}

// ── CARD HTML ────────────────────────────────────────────
function storeImgHTML(p, tone, iconPaths, size) {
  const initial = (p.name || '?').replace(/^(日本品牌|台灣)/, '').trim().charAt(0);
  const sid = p.id || Math.random().toString(36).slice(2);
  if (p.image_url) {
    // Has image — render with bg layer; JS will detect favicon after load
    return `<div class="store-image store-image--${size||'card'}" style="--tone:${tone}" data-img-wrap>
      <div class="store-image__bg"></div>
      <img src="${escHtml(p.image_url)}" alt="${escHtml(p.name)}" loading="lazy"
        onload="onImgLoad(this)"
        onerror="this.closest('[data-img-wrap]').outerHTML=fallbackImg('${escHtml(p.name)}','${escHtml(p.category)}','${tone}','${sid}','${escHtml(iconPaths)}')">
      <div class="store-image__cat-tag">${escHtml(p.category)}</div>
    </div>`;
  }
  return fallbackImg(p.name, p.category, tone, sid, iconPaths);
}

// format reward value — always show as %
function fmtReward(val) {
  if (!val || val === '—') return '—';
  const s = String(val).trim();
  // already has % → keep as-is
  if (s.includes('%')) return s;
  // decimal like 0.11 → 11%
  const n = parseFloat(s);
  if (!isNaN(n) && n < 1) return (n * 100).toFixed(0) + '%';
  return s;
}

function cardHTML(p, i) {
  const tone    = CATEGORY_TONE[p.category] || '#B8704B';
  const isOnline = p.store_type === '網路';
  const iconPaths = CAT_ICONS[p.category] || CAT_ICONS['知名品牌'];

  const imgSection = storeImgHTML(p, tone, iconPaths, 'card');

  const typeClass = isOnline ? 'type-pill--online' : 'type-pill--offline';
  const typeIcon  = isOnline
    ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`
    : `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;

  const rewardSection = (p.ibv || p.cashback) ? `
    <div class="card__rewards">
      <div class="reward reward--cashback">
        <div class="reward__label">現金回饋 / IBV</div>
        <div class="reward__value"><strong>${fmtReward(p.cashback)}</strong></div>
      </div>
      <div class="reward reward--ibv">
        <div class="reward__label">IBV</div>
        <div class="reward__value"><strong>${fmtReward(p.ibv)}</strong></div>
      </div>
    </div>` : '';

  const noteSection = p.note ? `
    <div class="card__note">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="flex:none;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span class="card__note-text">${escHtml(p.note)}</span>
    </div>` : '';

  return `
  <article class="card" style="--tone:${tone}">
    ${imgSection}
    <div class="card__body">
      <div class="card__accent"></div>
      <div class="card__pills">
        <span class="cat-pill" style="--tone:${tone}">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${iconPaths}</svg>
          ${escHtml(p.category || '')}
        </span>
        ${p.store_type ? `<span class="type-pill ${typeClass}">${typeIcon}${escHtml(p.store_type)}</span>` : ''}
      </div>
      <h3 class="card__title">${escHtml(p.name)}</h3>
      ${p.description ? `<p class="card__desc">${escHtml(p.description)}</p>` : ''}
      ${rewardSection}
      ${noteSection}
      <div class="card__cta">
        <span>查看詳情</span>
        <span class="card__cta-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </span>
      </div>
    </div>
  </article>`;
}

// favicon detection on load
window.onImgLoad = function(img) {
  const w = img.naturalWidth, h = img.naturalHeight;
  if (w <= 128 && h <= 128) {
    img.closest('[data-img-wrap]').classList.add('store-image--favicon');
  }
};

// fallback image HTML (used both inline and via onerror)
window.fallbackImg = function(name, cat, tone, sid, iconPaths) {
  const initial = (name || '?').replace(/^(日本品牌|台灣)/, '').trim().charAt(0);
  sid = sid || Math.random().toString(36).slice(2);
  iconPaths = iconPaths || '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>';
  return `<div class="store-image store-image--fallback" style="--tone:${tone}">
    <svg class="store-image__deco" viewBox="0 0 200 80" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <pattern id="p-${sid}" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
          <circle cx="7" cy="7" r="0.8" fill="rgba(255,255,255,0.18)"/>
        </pattern>
        <linearGradient id="g-${sid}" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.12)"/>
        </linearGradient>
      </defs>
      <rect width="200" height="80" fill="url(#g-${sid})"/>
      <rect width="200" height="80" fill="url(#p-${sid})"/>
      <circle cx="170" cy="20" r="36" fill="rgba(255,255,255,0.08)"/>
      <circle cx="190" cy="60" r="22" fill="rgba(255,255,255,0.06)"/>
    </svg>
    <div class="store-image__mark">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${iconPaths}</svg>
      <span class="store-image__initial">${initial}</span>
    </div>
    <div class="store-image__cat-tag">${cat}</div>
  </div>`;
};

// ── MODAL ────────────────────────────────────────────────
function openModal(p) {
  openStore = p;
  const tone = CATEGORY_TONE[p.category] || '#B8704B';
  const isOnline = p.store_type === '網路';
  const iconPaths = CAT_ICONS[p.category] || CAT_ICONS['知名品牌'];

  const imgSection = storeImgHTML(p, tone, iconPaths, 'modal');

  const root = document.getElementById('modalRoot');
  root.innerHTML = `
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" style="--tone:${tone}">
      <button class="modal__close" id="modalClose" aria-label="關閉">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal__hero">${imgSection}</div>
      <div class="modal__body">
        <div class="modal__pills">
          <span class="cat-pill" style="--tone:${tone}">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${iconPaths}</svg>
            ${escHtml(p.category || '')}
          </span>
          ${p.store_type ? `<span class="type-pill ${isOnline?'type-pill--online':'type-pill--offline'}">${escHtml(p.store_type)}</span>` : ''}
        </div>
        <h2 class="modal__title">${escHtml(p.name)}</h2>
        ${p.description ? `<p class="modal__desc">${escHtml(p.description)}</p>` : ''}
        ${(p.ibv || p.cashback) ? `
        <div class="modal__rewards">
          <div class="modal-reward">
            <div class="modal-reward__label">IBV</div>
            <div class="modal-reward__value">${fmtReward(p.ibv)}</div>
            <div class="modal-reward__hint">點數回饋</div>
          </div>
          <div class="modal-reward modal-reward--accent">
            <div class="modal-reward__label">現金回饋</div>
            <div class="modal-reward__value">${fmtReward(p.cashback)}</div>
            <div class="modal-reward__hint">最高比率</div>
          </div>
          <div class="modal-reward">
            <div class="modal-reward__label">類型</div>
            <div class="modal-reward__value" style="font-size:22px">${escHtml(p.store_type || '—')}</div>
            <div class="modal-reward__hint">${isOnline?'網路商店':'實體商店'}</div>
          </div>
        </div>` : ''}
        ${p.note ? `
        <div class="modal__note">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="flex:none;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <div>
            <div class="modal__note-label">備註</div>
            <p>${escHtml(p.note)}</p>
          </div>
        </div>` : ''}
        ${p.website_url ? `
        <a href="${p.website_url}" target="_blank" rel="noopener noreferrer" class="modal__link">
          前往商店
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>` : ''}
      </div>
    </div>
  </div>`;

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalBackdrop').addEventListener('click', e => { if (e.target.id === 'modalBackdrop') closeModal(); });
  document.body.style.overflow = 'hidden';

  const onKey = e => { if (e.key === 'Escape') closeModal(); };
  document.addEventListener('keydown', onKey);
  root._onKey = onKey;
}

function closeModal() {
  document.getElementById('modalRoot').innerHTML = '';
  document.body.style.overflow = '';
  if (document.getElementById('modalRoot')._onKey)
    document.removeEventListener('keydown', document.getElementById('modalRoot')._onKey);
}

// ── FILTER EVENTS ────────────────────────────────────────
document.querySelectorAll('[data-type]').forEach(btn =>
  btn.addEventListener('click', () => {
    currentType = btn.dataset.type;
    document.querySelectorAll('[data-type]').forEach(b => b.classList.toggle('chip--active', b.dataset.type === currentType));
    renderGrid();
  })
);

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGrid();
});

// ── UTILS ────────────────────────────────────────────────
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

fetchPartners();
</script>
</body>
</html>
