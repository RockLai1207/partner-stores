<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精選夥伴商店</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+TC:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --warm-white: #faf8f4;
    --ink: #1a1410;
    --earth: #8b6f47;
    --rust: #c4622d;
    --sage: #6b7c5e;
    --gold: #c9a84c;
    --mist: #e8e2d8;
    --card-bg: #ffffff;
    --shadow: rgba(26,20,16,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', 'Noto Serif TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  header {
    position: relative;
    padding: 60px 40px 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--mist);
    background: var(--warm-white);
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .header-left h1 em {
    font-style: italic;
    color: var(--earth);
  }

  .header-left p {
    margin-top: 12px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    color: var(--earth);
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .header-right {
    text-align: right;
  }

  .store-count {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 400;
    color: var(--gold);
    line-height: 1;
  }

  .store-count span {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    color: var(--earth);
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Filter bar */
  .filter-bar {
    padding: 20px 40px;
    background: var(--warm-white);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--mist);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(8px);
  }

  .filter-label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--earth);
    font-weight: 500;
    margin-right: 4px;
  }

  .filter-btn {
    padding: 6px 16px;
    border: 1.5px solid var(--mist);
    border-radius: 100px;
    background: transparent;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .filter-btn:hover {
    border-color: var(--earth);
    color: var(--earth);
  }

  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: white;
  }

  /* Search */
  .search-wrap {
    margin-left: auto;
    position: relative;
  }

  .search-wrap input {
    padding: 7px 16px 7px 36px;
    border: 1.5px solid var(--mist);
    border-radius: 100px;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--ink);
    outline: none;
    width: 180px;
    transition: all 0.2s ease;
  }

  .search-wrap input:focus {
    border-color: var(--earth);
    width: 220px;
  }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--earth);
    font-size: 1rem;
  }

  /* Grid */
  main {
    position: relative;
    z-index: 1;
    padding: 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 28px;
  }

  /* Card */
  .card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 16px var(--shadow);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
    animation: fadeUp 0.5s ease both;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 40px rgba(26,20,16,0.14);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: var(--mist);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    position: relative;
    overflow: hidden;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card-img .placeholder-emoji {
    font-size: 3.5rem;
    opacity: 0.4;
  }

  .category-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--ink);
    color: white;
    font-size: 0.68rem;
    padding: 4px 10px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .card-body {
    padding: 20px 22px 22px;
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .card-promo {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.82rem;
    color: var(--rust);
    font-weight: 400;
    margin-bottom: 14px;
    line-height: 1.5;
  }

  .card-divider {
    height: 1px;
    background: var(--mist);
    margin-bottom: 14px;
  }

  .card-info {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 0.8rem;
    color: #666;
  }

  .info-icon {
    flex-shrink: 0;
    width: 16px;
    color: var(--earth);
    margin-top: 1px;
  }

  .info-text {
    line-height: 1.4;
  }

  .info-text a {
    color: var(--earth);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .info-text a:hover {
    border-color: var(--earth);
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 40px;
    color: var(--earth);
    font-size: 0.8rem;
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    letter-spacing: 0.06em;
    border-top: 1px solid var(--mist);
    background: var(--warm-white);
    position: relative;
    z-index: 1;
  }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--earth);
    font-family: 'Noto Serif TC', serif;
  }

  .empty-state .emoji { font-size: 3rem; margin-bottom: 16px; }
  .empty-state p { font-size: 0.9rem; font-weight: 300; }

  /* Loading */
  .loading-state {
    grid-column: 1 / -1;
    display: flex;
    justify-content: center;
    padding: 60px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--mist);
    border-top-color: var(--earth);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 768px) {
    header { padding: 40px 20px 24px; flex-direction: column; gap: 16px; align-items: flex-start; }
    .filter-bar { padding: 16px 20px; }
    .search-wrap { margin-left: 0; width: 100%; }
    .search-wrap input { width: 100%; }
    .search-wrap input:focus { width: 100%; }
    main { padding: 24px 20px; }
    .grid { gap: 16px; grid-template-columns: 1fr; }
  }

  /* Decorative line */
  .deco-line {
    display: inline-block;
    width: 40px;
    height: 2px;
    background: var(--gold);
    vertical-align: middle;
    margin-right: 10px;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>精選<em>夥伴</em><br>商店</h1>
    <p><span class="deco-line"></span>精心挑選，值得信賴的合作夥伴</p>
  </div>
  <div class="header-right">
    <div class="store-count" id="storeCount">—</div>
    <span style="font-family:'DM Sans',sans-serif;font-size:0.75rem;color:var(--earth);letter-spacing:0.1em;text-transform:uppercase;">間夥伴商店</span>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">類別</span>
  <button class="filter-btn active" data-cat="all">全部</button>
  <div id="categoryBtns"></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜尋商店...">
  </div>
</div>

<main>
  <div class="grid" id="grid">
    <div class="loading-state"><div class="spinner"></div></div>
  </div>
</main>

<footer>
  © 精選夥伴商店 · 用心推薦，每間都值得
</footer>

<script>
  // ===== 設定區 =====
  // 把你的 Google Apps Script 網址貼在這裡
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPWdr1vPE5PV1ETG6mzlhHgDIB2eqBfUwgpc9KHGRrkdOSjAm7FEloktdbrvRgVbgP/exec';

  // ===== 資料與狀態 =====
  let allPartners = [];
  let currentCat = 'all';
  let searchQuery = '';

  // ===== 讀取資料 =====
  async function fetchPartners() {
    try {
      const res = await fetch(`${SCRIPT_URL}?action=list`);
      const data = await res.json();
      allPartners = data.filter(p => p.is_active !== false && p.is_active !== 'FALSE');
      renderAll();
    } catch (e) {
      console.error('無法載入資料:', e);
      document.getElementById('grid').innerHTML = `
        <div class="empty-state">
          <div class="emoji">⚠️</div>
          <p>無法載入資料，請確認 Apps Script 設定</p>
        </div>`;
    }
  }

  // ===== 渲染 =====
  function renderAll() {
    renderCategories();
    renderGrid();
  }

  function renderCategories() {
    const cats = [...new Set(allPartners.map(p => p.category).filter(Boolean))];
    const container = document.getElementById('categoryBtns');
    container.innerHTML = cats.map(cat => `
      <button class="filter-btn ${currentCat === cat ? 'active' : ''}" data-cat="${cat}">${cat}</button>
    `).join('');
    container.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => setCategory(btn.dataset.cat));
    });
  }

  function renderGrid() {
    const filtered = allPartners.filter(p => {
      const matchCat = currentCat === 'all' || p.category === currentCat;
      const q = searchQuery.toLowerCase();
      const matchSearch = !q || p.name?.toLowerCase().includes(q) || p.promo_title?.toLowerCase().includes(q);
      return matchCat && matchSearch;
    });

    document.getElementById('storeCount').textContent = allPartners.length;

    const grid = document.getElementById('grid');
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="emoji">🔍</div><p>找不到符合的商店</p></div>`;
      return;
    }

    grid.innerHTML = filtered.map((p, i) => `
      <div class="card" style="animation-delay:${i * 0.06}s">
        <div class="card-img">
          ${p.logo_url
            ? `<img src="${p.logo_url}" alt="${p.name}" onerror="this.parentElement.innerHTML='<span class=placeholder-emoji>🏪</span>'">`
            : `<span class="placeholder-emoji">🏪</span>`}
          ${p.category ? `<span class="category-badge">${p.category}</span>` : ''}
        </div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          ${p.promo_title ? `<div class="card-promo">✦ ${p.promo_title}</div>` : ''}
          <div class="card-divider"></div>
          <div class="card-info">
            ${p.address ? `<div class="info-row"><span class="info-icon">📍</span><span class="info-text">${
              p.map_url ? `<a href="${p.map_url}" target="_blank">${p.address}</a>` : p.address
            }</span></div>` : ''}
            ${p.phone ? `<div class="info-row"><span class="info-icon">📞</span><span class="info-text"><a href="tel:${p.phone}">${p.phone}</a></span></div>` : ''}
            ${p.line_id ? `<div class="info-row"><span class="info-icon">💬</span><span class="info-text">LINE：${p.line_id}</span></div>` : ''}
            ${p.website_url ? `<div class="info-row"><span class="info-icon">🔗</span><span class="info-text"><a href="${p.website_url}" target="_blank">${p.website_url.replace(/^https?:\/\//, '')}</a></span></div>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  function setCategory(cat) {
    currentCat = cat;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
    renderGrid();
  }

  // ===== 搜尋 =====
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderGrid();
  });

  // ===== 啟動 =====
  fetchPartners();
</script>
</body>
</html>
