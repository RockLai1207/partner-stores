<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精選夥伴商店</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+TC:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --warm-white: #faf8f4;
    --ink: #1a1410;
    --earth: #8b6f47;
    --rust: #c4622d;
    --sage: #6b7c5e;
    --gold: #c9a84c;
    --mist: #e8e2d8;
    --card-bg: #ffffff;
    --shadow: rgba(26,20,16,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', 'Noto Serif TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  header {
    position: relative;
    padding: 60px 40px 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--mist);
    background: var(--warm-white);
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .header-left h1 em { font-style: italic; color: var(--earth); }

  .header-left p {
    margin-top: 12px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    color: var(--earth);
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .store-count {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 400;
    color: var(--gold);
    line-height: 1;
    text-align: right;
  }

  .store-count .label {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    color: var(--earth);
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Filter bars */
  .filter-bar {
    padding: 14px 40px;
    background: var(--warm-white);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--mist);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .filter-type-bar {
    padding: 10px 40px;
    background: rgba(250,248,244,0.95);
    display: flex;
    gap: 8px;
    align-items: center;
    border-bottom: 1px solid var(--mist);
    position: sticky;
    top: 53px;
    z-index: 9;
    backdrop-filter: blur(6px);
  }

  .filter-label {
    font-size: 0.71rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--earth);
    font-weight: 600;
    margin-right: 2px;
    flex-shrink: 0;
  }

  .filter-btn {
    padding: 5px 13px;
    border: 1.5px solid var(--mist);
    border-radius: 100px;
    background: transparent;
    color: var(--ink);
    font-family: 'DM Sans', 'Noto Serif TC', sans-serif;
    font-size: 0.77rem;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--earth); color: var(--earth); }
  .filter-btn.active { background: var(--ink); border-color: var(--ink); color: white; }

  .search-wrap {
    margin-left: auto;
    position: relative;
    flex-shrink: 0;
  }

  .search-wrap input {
    padding: 6px 14px 6px 32px;
    border: 1.5px solid var(--mist);
    border-radius: 100px;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--ink);
    outline: none;
    width: 170px;
    transition: all 0.2s ease;
  }

  .search-wrap input:focus { border-color: var(--earth); width: 210px; }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--earth);
    font-size: 1rem;
  }

  /* Grid */
  main {
    position: relative;
    z-index: 1;
    padding: 36px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 22px;
  }

  /* Card */
  .card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 14px var(--shadow);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: fadeUp 0.5s ease both;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 36px rgba(26,20,16,0.13);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Card image */
  .card-img {
    width: 100%;
    height: 160px;
    overflow: hidden;
    background: #f0ebe2;
    position: relative;
    flex-shrink: 0;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .card:hover .card-img img {
    transform: scale(1.04);
  }

  .card-img .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f0ebe2 0%, #e8e0d4 100%);
    font-size: 2.8rem;
    opacity: 0.5;
  }

  /* Card header */
  .card-header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid #f0ebe2;
  }

  .card-name-wrap { flex: 1; min-width: 0; }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 5px;
  }

  .card-type-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.67rem;
    padding: 2px 9px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .tag-online { background: #e6f0e6; color: var(--sage); border: 1px solid #c4d8c4; }
  .tag-physical { background: #f0e8dc; color: var(--earth); border: 1px solid #dcc8b0; }

  .category-badge {
    flex-shrink: 0;
    background: var(--ink);
    color: white;
    font-size: 0.62rem;
    padding: 3px 9px;
    border-radius: 100px;
    font-family: 'DM Sans', 'Noto Serif TC', sans-serif;
    letter-spacing: 0.03em;
    white-space: nowrap;
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Card body */
  .card-body {
    padding: 14px 20px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card-desc {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.83rem;
    color: #555;
    line-height: 1.7;
  }

  /* Reward boxes */
  .reward-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .reward-box {
    background: #faf6ef;
    border: 1px solid #ede5d6;
    border-radius: 10px;
    padding: 10px 12px;
  }

  .reward-label {
    font-size: 0.63rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--earth);
    font-weight: 600;
    margin-bottom: 3px;
  }

  .reward-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--ink);
    font-weight: 700;
    line-height: 1.2;
  }

  .reward-value.accent { color: var(--rust); }

  /* Note */
  .card-note {
    font-size: 0.76rem;
    color: #777;
    line-height: 1.55;
    padding: 8px 12px;
    background: #faf7f0;
    border-radius: 8px;
    border-left: 3px solid var(--gold);
  }

  /* Footer link */
  .card-footer {
    padding: 12px 20px;
    border-top: 1px solid #f0ebe2;
  }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--earth);
    font-size: 0.8rem;
    text-decoration: none;
    font-weight: 500;
    transition: gap 0.2s;
  }

  .card-link:hover { gap: 10px; }

  footer {
    text-align: center;
    padding: 40px;
    color: var(--earth);
    font-size: 0.8rem;
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    letter-spacing: 0.06em;
    border-top: 1px solid var(--mist);
    background: var(--warm-white);
    position: relative;
    z-index: 1;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--earth);
    font-family: 'Noto Serif TC', serif;
  }

  .empty-state .emoji { font-size: 3rem; margin-bottom: 16px; }
  .empty-state p { font-size: 0.9rem; font-weight: 300; }

  .loading-state { grid-column: 1 / -1; display: flex; justify-content: center; padding: 60px; }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--mist);
    border-top-color: var(--earth);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .deco-line {
    display: inline-block;
    width: 36px; height: 2px;
    background: var(--gold);
    vertical-align: middle;
    margin-right: 10px;
  }

  @media (max-width: 768px) {
    header { padding: 36px 20px 24px; flex-direction: column; gap: 16px; align-items: flex-start; }
    .filter-bar, .filter-type-bar { padding: 12px 16px; top: auto; position: static; }
    .search-wrap { margin-left: 0; width: 100%; }
    .search-wrap input, .search-wrap input:focus { width: 100%; }
    main { padding: 20px 16px; }
    .grid { gap: 14px; grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>精選<em>夥伴</em><br>商店</h1>
    <p><span class="deco-line"></span>精心挑選，值得信賴的合作夥伴</p>
  </div>
  <div class="store-count">
    <span id="storeCount">—</span>
    <span class="label">間夥伴商店</span>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">類別</span>
  <button class="filter-btn active" data-cat="all">全部</button>
  <div id="categoryBtns" style="display:contents"></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜尋商店...">
  </div>
</div>

<div class="filter-type-bar">
  <span class="filter-label">類型</span>
  <button class="filter-btn active" data-type="all">全部</button>
  <button class="filter-btn" data-type="網路">🌐 網路</button>
  <button class="filter-btn" data-type="實體">🏪 實體</button>
</div>

<main>
  <div class="grid" id="grid">
    <div class="loading-state"><div class="spinner"></div></div>
  </div>
</main>

<footer>© 精選夥伴商店 · 用心推薦，每間都值得</footer>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzIdGmI2SauhBY_Uk5eGr2CoM0GnbU4cj0xTpIaFKpnDUrElpmaC9aZ65dmGBCP1tTs/exec';

  const CATEGORIES = [
    '知名品牌','居家','生活綜合型電商','美食佳餚',
    '服飾穿搭','旅遊住宿票券餐券','專業服務','寵物','藝術與文化'
  ];

  let allPartners = [];
  let currentCat = 'all';
  let currentType = 'all';
  let searchQuery = '';

  async function fetchPartners() {
    try {
      const res = await fetch(`${SCRIPT_URL}?action=list`);
      const data = await res.json();
      allPartners = data.filter(p => p.is_active !== false && p.is_active !== 'FALSE');
      renderAll();
    } catch (e) {
      document.getElementById('grid').innerHTML = `
        <div class="empty-state"><div class="emoji">⚠️</div><p>無法載入資料，請確認 Apps Script 設定</p></div>`;
    }
  }

  function renderAll() {
    renderCategories();
    renderGrid();
    document.getElementById('storeCount').textContent = allPartners.length;
  }

  function renderCategories() {
    const used = new Set(allPartners.map(p => p.category).filter(Boolean));
    document.getElementById('categoryBtns').innerHTML = CATEGORIES
      .filter(c => used.has(c))
      .map(cat => `<button class="filter-btn ${currentCat===cat?'active':''}" data-cat="${cat}">${cat}</button>`)
      .join('');
    document.querySelectorAll('[data-cat]').forEach(btn =>
      btn.addEventListener('click', () => {
        currentCat = btn.dataset.cat;
        document.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
        renderGrid();
      })
    );
  }

  function renderGrid() {
    const filtered = allPartners.filter(p => {
      const matchCat = currentCat === 'all' || p.category === currentCat;
      const matchType = currentType === 'all' || p.store_type === currentType;
      const q = searchQuery.toLowerCase();
      const matchSearch = !q || p.name?.toLowerCase().includes(q) || p.description?.toLowerCase().includes(q);
      return matchCat && matchType && matchSearch;
    });

    const grid = document.getElementById('grid');
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state"><div class="emoji">🔍</div><p>找不到符合的商店</p></div>`;
      return;
    }

    grid.innerHTML = filtered.map((p, i) => {
      const isOnline = p.store_type === '網路';
      const typeTag = p.store_type
        ? `<span class="card-type-tag ${isOnline ? 'tag-online' : 'tag-physical'}">${isOnline ? '🌐 網路' : '🏪 實體'}</span>`
        : '';

      const ibvBox = p.ibv
        ? `<div class="reward-box"><div class="reward-label">IBV</div><div class="reward-value">${p.ibv}</div></div>` : '';
      const cashBox = p.cashback
        ? `<div class="reward-box"><div class="reward-label">現金回饋 / IBV</div><div class="reward-value accent">${p.cashback}</div></div>` : '';

      const imgSection = p.image_url
        ? `<div class="card-img"><img src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=img-placeholder>🏪</div>'"></div>`
        : `<div class="card-img"><div class="img-placeholder">🏪</div></div>`;

      return `
      <div class="card" style="animation-delay:${i*0.05}s">
        ${imgSection}
        <div class="card-header">
          <div class="card-name-wrap">
            <div class="card-name">${p.name}</div>
            ${typeTag}
          </div>
          ${p.category ? `<span class="category-badge">${p.category}</span>` : ''}
        </div>
        <div class="card-body">
          ${p.description ? `<div class="card-desc">${p.description}</div>` : ''}
          ${(ibvBox||cashBox) ? `<div class="reward-row">${ibvBox}${cashBox}</div>` : ''}
          ${p.note ? `<div class="card-note">📌 ${p.note}</div>` : ''}
        </div>
        ${p.website_url ? `
        <div class="card-footer">
          <a href="${p.website_url}" target="_blank" class="card-link">
            前往商店 →
          </a>
        </div>` : ''}
      </div>`;
    }).join('');
  }

  document.querySelectorAll('[data-type]').forEach(btn =>
    btn.addEventListener('click', () => {
      currentType = btn.dataset.type;
      document.querySelectorAll('[data-type]').forEach(b => b.classList.toggle('active', b.dataset.type === currentType));
      renderGrid();
    })
  );

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderGrid();
  });

  fetchPartners();
</script>
</body>
</html>
